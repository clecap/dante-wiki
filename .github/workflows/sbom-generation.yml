name: Generate SBOM for Dockerfiles

on:
  push:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read

concurrency:
  group: sbom-generation
  cancel-in-progress: false

jobs:
  generate-sbom:
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install syft (Anchore CLI)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin
          syft version

      - name: Generate SBOM for Docker image and repo
        run: |
          mkdir -p .github/results
          syft clecap/dante-wiki:latest -o json \
            > .github/results/sbom-dante-wiki-docker.json
          syft dir:. -o json \
            > .github/results/sbom-dante-wiki-docker-repo.json
          ls -alg .github/results

      - name: Upload SBOM files as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-files
          path: .github/results/*.json